version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tripcontrol-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tripcontrol
    ports:
      - '5432:5432'
    volumes:
      - tripcontrol_pgdata:/var/lib/postgresql/data
    networks:
      - tripcontrol-net

volumes:
  tripcontrol_pgdata:

networks:
  tripcontrol-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
